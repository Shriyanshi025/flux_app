steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/flux-fortress-protocol:latest', '--build-arg', 'VITE_GOOGLE_MAPS_KEY=$_VITE_GOOGLE_MAPS_KEY', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/flux-fortress-protocol:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'flux-fortress-protocol'
      - '--image'
      - 'gcr.io/$PROJECT_ID/flux-fortress-protocol:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/flux-fortress-protocol:latest'

options:
  logging: CLOUD_LOGGING_ONLY
